{% extends "base.html" %}
{% block title %}Link expired · Arescope{% endblock %}
{% block content %}
<div class="authscreen">
<section class="auth-card">
  <span class="eyebrow">Link expired</span>
  <h1>That link didn't work</h1>
  <p class="muted">
    Magic links expire and can only be used once. Request a fresh one and try again.
  </p>
  <form method="post" action="/magic" class="form">
    <input type="hidden" name="csrf" value="{{ csrf }}" />
    <label>Email
      <input type="email" name="email" autocomplete="email" placeholder="you@example.com" required />
    </label>
    <button class="btn btn-primary" type="submit">Send a new link</button>
  </form>
  <p class="muted swap">Prefer a password? <a href="/login">Log in</a>.</p>
</section>
</div>
{% endblock %}
