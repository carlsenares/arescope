<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="noindex" />
    <title>{% block title %}Arescope{% endblock %}</title>
    <link rel="stylesheet" href="/app/static/app.css?v={{ asset_v }}" />
  </head>
  <body>
    <header class="appbar">
      <a class="brand" href="{{ '/app' if user else '/' }}">ARESCOPE</a>
      <nav class="appbar-right">
        {% if user %}
        <a href="/app" class="navlink">Dashboard</a>
        <a href="/app/map" class="navlink">Identity map</a>
        <a href="/app/password" class="navlink">Password check</a>
        {% if user.is_admin %}<a href="/app/admin" class="navlink">Admin</a>{% endif %}
        <div class="account-stack">
          <form method="post" action="/logout" class="inline">
            <input type="hidden" name="csrf" value="{{ csrf }}" />
            <button class="btn btn-ghost btn-sm" type="submit">Log out</button>
          </form>
          <a class="account-icon-btn" href="/app/account" aria-label="Account settings" title="Account settings">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
          </a>
        </div>
        {% else %}
        <a href="/login" class="navlink">Log in</a>
        <a href="/signup" class="btn btn-primary btn-sm">Sign up</a>
        {% endif %}
      </nav>
    </header>
    <main class="appmain">{% block content %}{% endblock %}</main>
    <script>window.ARESCOPE_CSRF = {{ csrf|tojson }};</script>
  </body>
</html>
