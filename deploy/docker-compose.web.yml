# Arescope website (arescope.com) — static server.
#
# Serves the built Astro site (web/dist) as a tiny standalone nginx, bound to the
# docker bridge gateway 172.18.0.1:5190 (NOT a public interface). The shared
# insureai_nginx gateway reverse-proxies arescope.com -> 172.18.0.1:5190, exactly
# like aresium (5173) and ares-empire (5185). Decoupled from the engine stack
# (docker-compose.yml) so the marketing site deploys independently.
#
#   cd web && npm ci && npm run build        # produce web/dist
#   docker compose -f deploy/docker-compose.web.yml up -d
#
# Verify the bridge gateway IP first: `docker network inspect insureai_network`
# (the gateway). If it isn't 172.18.0.1, change the published IP below + the
# proxy_pass target in deploy/nginx/arescope.conf and enable-tls-arescope.sh.
services:
  web:
    image: nginx:1.27-alpine
    container_name: arescope_web
    restart: unless-stopped
    volumes:
      - ../web/dist:/usr/share/nginx/html:ro
    ports:
      - "172.18.0.1:5190:80"
