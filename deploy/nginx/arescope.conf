# ============================================================
# Arescope — arescope.com  (HTTP bootstrap vhost)
# Additive vhost on the shared insureai_nginx gateway. Coexists with default.conf
# (insureares), aresium.conf, arestoteles.conf and ares-empire.conf — all
# untouched. Proxies to the static site container on the bridge gateway
# 172.18.0.1:5190 (see deploy/docker-compose.web.yml).
#
# This is the pre-TLS bootstrap: serves the ACME challenge and proxies over plain
# HTTP so nothing references a cert that doesn't exist yet (a broken vhost would
# take down every site on reload). enable-tls-arescope.sh replaces it with the
# HTTPS version once the cert is issued.
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name arescope.com www.arescope.com;

    # Let's Encrypt HTTP-01 challenge (certbot drops files here)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://172.18.0.1:5190;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }
}
